<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #cfd9df, #e2ebf0);
        }
    </style>
</head>
<body>

    <!-- Centered Card -->
    <div class="container d-flex justify-content-center align-items-center vh-100">
        
        <div class="card shadow-lg p-4" style="width: 400px; border-radius: 15px;">
            
            <!-- Title -->
            <div class="text-center mb-3">
                <i class="bi bi-shield-lock" style="font-size: 3rem;"></i>
                <h3 class="mt-2">Reset Password</h3>
                <p class="text-muted">Enter your new password</p>
            </div>

            <form>

                <!-- New Password -->
                <div class="mb-3">
                    <label class="form-label">New Password</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-lock"></i>
                        </span>
                        <input type="password" id="newPassword" class="form-control" placeholder="Enter new password" required>
                        <span class="input-group-text" onclick="togglePassword('newPassword', this)">
                            <i class="bi bi-eye"></i>
                        </span>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div class="mb-3">
                    <label class="form-label">Confirm Password</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-lock-fill"></i>
                        </span>
                        <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm password" required>
                        <span class="input-group-text" onclick="togglePassword('confirmPassword', this)">
                            <i class="bi bi-eye"></i>
                        </span>
                    </div>
                </div>

                <!-- Update Button -->
                <button type="submit" class="btn btn-success w-100">
                    <i class="bi bi-check-circle"></i> Update Password
                </button>

                <!-- Back to Login -->
                <div class="text-center mt-3">
                    <a href="login_page.html" class="text-decoration-none fw-bold text-primary">
                        <i class="bi bi-arrow-left"></i> Back to Login
                    </a>
                </div>

            </form>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Password Toggle Script -->
    <script>
        function togglePassword(fieldId, iconSpan) {
            const input = document.getElementById(fieldId);
            const icon = iconSpan.querySelector("i");

            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove("bi-eye");
                icon.classList.add("bi-eye-slash");
            } else {
                input.type = "password";
                icon.classList.remove("bi-eye-slash");
                icon.classList.add("bi-eye");
            }
        }
    </script>

</body>
</html>
