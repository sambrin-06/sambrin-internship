<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>

    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
        }
    </style>
</head>
<body>

    <!-- Centered Card -->
    <div class="container d-flex justify-content-center align-items-center vh-100">
        
        <div class="card shadow-lg p-4" style="width: 380px; border-radius: 15px;">
            
            <!-- Title -->
            <div class="text-center mb-3">
                <i class="bi bi-key" style="font-size: 3rem;"></i>
                <h3 class="mt-2">Forgot Password</h3>
                <p class="text-muted">Enter your email to reset your password</p>
            </div>

            <form>
                
                <!-- Email Input -->
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-envelope"></i>
                        </span>
                        <input type="email" class="form-control" placeholder="Enter your email" required>
                    </div>
                </div>

                <!-- Reset Button -->
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-arrow-repeat"></i> Reset Password
                </button>

                <!-- Back to Login -->
                <div class="text-center mt-3">
                    <a href="login_page.html" class="text-decoration-none fw-bold text-success">
                        <i class="bi bi-arrow-left"></i> Back to Login
                    </a>
                </div>

            </form>

        </div>

    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
