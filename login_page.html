<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internship Login</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #74ebd5, #ACB6E5);
        }
    </style>
</head>
<body>

    <!-- Centered Card -->
    <div class="container d-flex justify-content-center align-items-center vh-100">
        
        <div class="card shadow-lg p-4" style="width: 350px; border-radius: 15px;">
            
            <!-- Title -->
            <div class="text-center mb-3">
                <i class="bi bi-person-circle" style="font-size: 3rem;"></i>
                <h2 class="mt-2">Internship Login</h2>
            </div>

            <form action="#" method="post">

                <!-- Username -->
                <div class="mb-3">
                    <label class="form-label">Username or Email:</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-person"></i>
                        </span>
                        <input type="text" name="username" class="form-control" placeholder="Enter username or email" required>
                    </div>
                </div>

                <!-- Password -->
                <div class="mb-3">
                    <label class="form-label">Password:</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-lock"></i>
                        </span>
                        <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                    </div>
                </div>

                <!-- Remember Me -->
                <div class="form-check mb-3">
                    <input type="checkbox" class="form-check-input" id="remember">
                    <label class="form-check-label" for="remember">Remember Me</label>
                </div>

                <!-- Login Button -->
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-box-arrow-in-right"></i> Login
                </button>

                <!-- Forgot Password -->
                <div class="text-end mt-2">
                    <a href="#" class="text-decoration-none text-primary">Forgot Password?</a>
                </div>

                <!-- Register -->
                <div class="text-center mt-3">
                    <p>Don't have an account? 
                        <a href="register_page.html" class="text-decoration-none fw-bold text-success">
                            Register Here
                        </a>
                    </p>
                </div>

            </form>

        </div>

    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
