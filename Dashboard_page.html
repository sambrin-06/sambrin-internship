<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">

    <title>Dashboard</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .card {
            border-radius: 15px;
        }

    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>

            <div class="ms-auto">
                <a href="login_page.html" class="btn btn-light">
                    <i class="bi bi-box-arrow-right"></i> Logout
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-5">

        <!-- Welcome Message -->
        <div class="mb-4">
            <h2>Welcome, User 👋</h2>
            <p class="text-muted">Here is your dashboard overview</p>
        </div>

        <!-- Dashboard Cards -->
        <div class="row g-4">

            <!-- Card 1 -->
            <div class="col-md-4">
                <div class="card shadow p-3 text-center">
                    <i class="bi bi-person-check display-4 text-primary"></i>
                    <h5 class="mt-3">Profile</h5>
                    <p class="text-muted">View and update your profile</p>
                </div>
            </div>

            <!-- Card 2 -->
            <div class="col-md-4">
                <div class="card shadow p-3 text-center">
                    <i class="bi bi-journal-text display-4 text-success"></i>
                    <h5 class="mt-3">Reports</h5>
                    <p class="text-muted">Check your activity reports</p>
                </div>
            </div>

            <!-- Card 3 -->
            <div class="col-md-4">
                <div class="card shadow p-3 text-center">
                    <i class="bi bi-gear display-4 text-warning"></i>
                    <h5 class="mt-3">Settings</h5>
                    <p class="text-muted">Manage your account settings</p>
                </div>
            </div>

        </div>

        <!-- Additional Section -->
        <div class="row mt-5">
            <div class="col-md-12">
                <div class="card shadow p-4">
                    <h5><i class="bi bi-activity"></i> Recent Activity</h5>
                    <ul class="list-group list-group-flush mt-3">
                        <li class="list-group-item">Logged in successfully</li>
                        <li class="list-group-item">Updated profile details</li>
                        <li class="list-group-item">Checked reports</li>
                    </ul>
                </div>
            </div>
        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
